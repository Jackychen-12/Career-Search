name: Daily Crawl & Data Refresh

on:
  schedule:
    - cron: "23 22 * * *"  # 每天 UTC 22:23（北京时间 06:23）
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm cache clean --force
          npm install --no-audit --no-fund
        timeout-minutes: 5

      - name: Crawl job sources + AI tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: npm run crawl
        continue-on-error: true
        timeout-minutes: 15

      - name: Retry crawl on failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: npm run crawl -- --only=seed,greenhouse,repo
        continue-on-error: true
        timeout-minutes: 12

      - name: Crawl summary
        if: always()
        run: |
          if [ -f data/meta.json ]; then
            echo "## Crawl Results" >> $GITHUB_STEP_SUMMARY
            node -e "
              const m = require('./data/meta.json');
              const lines = ['| Source | Count | Error |', '|---|---|---|'];
              for (const [k, v] of Object.entries(m.sources)) {
                lines.push('| ' + k + ' | ' + v + ' | ' + (m.errors[k] || '✓') + ' |');
              }
              lines.push('', '**Total: ' + m.count + ' jobs** | Updated: ' + m.fetchedAt);
              console.log(lines.join('\n'));
            " >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No meta.json found — crawl may have failed completely" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Send email notifications
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npx tsx scripts/notify.ts || echo "notification skipped"

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json data/meta.json data/diff.json data/events.json data/articles.json || true
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore(data): daily refresh [skip ci]"
            git push
          fi
