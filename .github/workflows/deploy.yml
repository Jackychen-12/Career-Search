name: Daily Crawl & Data Refresh

on:
  schedule:
    - cron: "23 22 * * *"  # 每天 UTC 22:23（北京时间 06:23）
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Crawl job sources + AI tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: npm run crawl || echo "crawl reported issues; keeping last good snapshot"

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json data/meta.json data/diff.json data/events.json data/articles.json || true
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore(data): daily refresh [skip ci]"
            git push || echo "push skipped"
          fi
